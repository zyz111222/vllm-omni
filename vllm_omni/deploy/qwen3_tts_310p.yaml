# Qwen3-TTS 310P deploy profile.
#
# Stage 0 uses 310P FULL_DECODE_ONLY graph capture. The model dtype is fp16
# because 310P does not support the Qwen3-TTS bf16 runtime path.
async_chunk: true

dtype: float16

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536
      codec_streaming: true
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 100
      codec_left_context_frames: 72
      initial_codec_chunk_frames: 100
      decode_cudagraph_capture_sizes: [100, 172, 325]
      code_predictor_prefix_graphs: true
      code_predictor_prefix_graph_buckets: [1]
      code_predictor_prefix_graph_seq_lens: [2, 3, 4, 5, 6, 7, 8]

stages:
  - stage_id: 0
    max_num_seqs: 10
    gpu_memory_utilization: 0.3
    trust_remote_code: true
    enable_prefix_caching: true
    async_scheduling: true
    max_num_batched_tokens: 512
    max_model_len: 16384
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05
    subtalker_sampling_params:
      do_sample: true
      temperature: 0.9
      top_k: 50
      top_p: 1.0

  - stage_id: 1
    max_num_seqs: 10
    gpu_memory_utilization: 0.3
    enforce_eager: false
    trust_remote_code: true
    enable_prefix_caching: false
    async_scheduling: true
    max_num_batched_tokens: 65536
    max_model_len: 65536
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.0

platforms:
  npu:
    stages:
      - stage_id: 0
        enforce_eager: false
        compilation_config:
          cudagraph_mode: FULL_DECODE_ONLY
